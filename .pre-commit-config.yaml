repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        description: Validates k8s manifests, compose files, and storm configs.
        args: [--allow-multiple-documents]
        exclude: ^deploy/helm-charts/.*/templates/.*$
      - id: check-json
        description: Validates realm.json and idpsecrets.json.
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: check-shebang-scripts-are-executable
        files: ^shared/scripts/.*\.sh$
      - id: check-symlinks          # catches broken symlinks in files/
      - id: destroyed-symlinks      # catches symlinks turned into files

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.11
    hooks:
      - id: ruff-check
        args: [ --fix ]
      - id: ruff-format

  - repo: https://github.com/gruntwork-io/pre-commit
    rev: v0.1.24
    hooks:
      - id: helmlint

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
        files: ^shared/scripts/.*\.sh$
        exclude: ^shared/scripts/fts/wait-for-it\.sh$
