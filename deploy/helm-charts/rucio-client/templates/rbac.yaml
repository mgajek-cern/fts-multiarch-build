apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "rucio-client.fullname" . }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "rucio-client.fullname" . }}-exec
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/exec"]
    verbs: ["get", "list", "create"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "deployments/scale", "statefulsets/scale", "deployments/status", "statefulsets/status"]
    verbs: ["get", "list", "patch"]
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "create", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "rucio-client.fullname" . }}-exec
subjects:
  - kind: ServiceAccount
    name: {{ include "rucio-client.fullname" . }}
roleRef:
  kind: Role
  name: {{ include "rucio-client.fullname" . }}-exec
  apiGroup: rbac.authorization.k8s.io
